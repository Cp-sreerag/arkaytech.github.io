<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZIPI AI | Arkay Technology</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#02050b;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
padding:15px 25px;
border-bottom:1px solid #1a2a44;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-weight:bold;
font-size:18px;
}

.back{
color:#5fd1c8;
text-decoration:none;
}


/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.message{
max-width:700px;
padding:12px 18px;
margin:8px 0;
border-radius:10px;
line-height:1.5;
}

.user{
align-self:flex-end;
background:#1a2a44;
}

.bot{
align-self:flex-start;
background:#0b1d33;
border:1px solid #1a2a44;
}


/* INPUT */

.input-area{
display:flex;
padding:15px;
border-top:1px solid #1a2a44;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
background:#0b1d33;
color:white;
}

button{
margin-left:10px;
padding:12px 20px;
background:#1a2a44;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#24395e;
}


/* VOICE BUTTON */

.voice-btn{
background:#5fd1c8;
color:black;
font-weight:bold;
}

.voice-btn:hover{
background:#4ab5ad;
}

</style>

</head>

<body>


<!-- HEADER -->

<div class="header">

<div class="title">ZIPI AI</div>

<a class="back" href="./">← Back to Arkay</a>

</div>



<!-- CHAT -->

<div class="chat" id="chat">

<div class="message bot">
Hello. I am ZIPI. How can I assist you today?
</div>

</div>



<!-- INPUT -->

<div class="input-area">

<input
id="input"
type="text"
placeholder="Type your message..."
>

<button onclick="sendMessage()">Send</button>

<button class="voice-btn" onclick="stopVoice()">Stop Voice</button>

</div>



<script>


let synth = window.speechSynthesis;


/* SEND MESSAGE */

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text === "") return;


addMessage(text, "user");

input.value="";


addMessage("Thinking...", "bot");

let bots = document.querySelectorAll(".bot");

let lastBot = bots[bots.length -1];


setTimeout(()=>{

let reply = "This is a demo voice response. ZIPI voice system is active.";

lastBot.innerText = reply;

speak(reply);

},1000);

}


/* ADD MESSAGE */

function addMessage(text, type){

let chat = document.getElementById("chat");

let msg = document.createElement("div");

msg.className = "message " + type;

msg.innerText = text;

chat.appendChild(msg);

chat.scrollTop = chat.scrollHeight;

}


/* SPEAK */

function speak(text){

let utter = new SpeechSynthesisUtterance(text);

utter.rate = 1;

utter.pitch = 1;

utter.volume = 1;

synth.speak(utter);

}


/* STOP */

function stopVoice(){

synth.cancel();

}


</script>


</body>

</html>
