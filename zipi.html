<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZIPI AI | Arkay Technology</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#02050b;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px 25px;
border-bottom:1px solid #1a2a44;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-weight:bold;
}

.back{
color:#5fd1c8;
text-decoration:none;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.message{
max-width:700px;
padding:12px 18px;
margin:8px 0;
border-radius:10px;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:#1a2a44;
}

.bot{
align-self:flex-start;
background:#0b1d33;
border:1px solid #1a2a44;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #1a2a44;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#0b1d33;
color:white;
}

button{
margin-left:10px;
padding:12px 20px;
background:#1a2a44;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.voice-btn{
background:#5fd1c8;
color:black;
}

</style>

</head>

<body>


<div class="header">

<div class="title">ZIPI AI</div>

<a class="back" href="./">← Back to Arkay</a>

</div>



<div class="chat" id="chat">

<div class="message bot">
Hello. I am ZIPI. How can I assist you today?
</div>

</div>



<div class="input-area">

<input id="input" placeholder="Type your message..."
onkeydown="if(event.key==='Enter'){sendMessage()}">

<button onclick="sendMessage()">Send</button>

<button class="voice-btn" onclick="stopVoice()">Stop Voice</button>

</div>



<script>

let synth = window.speechSynthesis;


/* SEND */

async function sendMessage(){

let input=document.getElementById("input");

let text=input.value;

if(!text) return;


addMessage(text,"user");

input.value="";


let botMsg=addMessage("Thinking...","bot");


try{

let response=await fetch(

"https://cpsreerag-zipi-ai.hf.space/chat",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
data:[text,[]]
})

}

);


let result=await response.json();


/* FIX HERE */

let reply=result.data[0][result.data[0].length-1].content;


botMsg.innerText=reply;

speak(reply);

}
catch{

botMsg.innerText="Connection error.";

}

}


/* ADD */

function addMessage(text,type){

let chat=document.getElementById("chat");

let msg=document.createElement("div");

msg.className="message "+type;

msg.innerText=text;

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;

return msg;

}


/* SPEAK */

function speak(text){

let utter=new SpeechSynthesisUtterance(text);

synth.speak(utter);

}


/* STOP */

function stopVoice(){

synth.cancel();

}

</script>


</body>

</html>
